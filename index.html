<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>watching</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            word-break: break-all;
            background-color: #ffffff;
            color: #000000;
            line-height: 1.5;
        }
        .font-noto {
            font-family: 'Noto Sans JP', sans-serif;
        }
        
        /* 旧Windows風ボタンのスタイル */
        .win95-button {
            background-color: #c0c0c0;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #808080;
            border-bottom: 2px solid #808080;
            padding: 4px 12px;
            font-size: 11px;
            font-family: "MS Sans Serif", "Arial", sans-serif;
            color: #000000;
            cursor: pointer;
            outline: none;
            user-select: none;
            height: fit-content;
            white-space: nowrap;
        }
        .win95-button:active {
            border-top: 2px solid #808080;
            border-left: 2px solid #808080;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            padding: 5px 11px 3px 13px;
        }

        .log-item {
            animation: fadeIn 0.6s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body class="font-noto">

    <div class="max-w-4xl mx-auto min-h-screen flex flex-col p-8 md:p-12">
        
        <header class="mb-12 flex items-center gap-6">
            <!-- 以前より高さを少し抑えました（32px→26px / 48px→38px） -->
            <img id="title-logo" src="./logo.svg" alt="watching" class="h-[26px] md:h-[38px] w-auto block transition-all duration-300">
            
            <button id="toggle-tora" class="win95-button" onclick="toggleLogo()">
                とらを表示
            </button>
        </header>

        <main id="log-container" class="flex-1 space-y-2">
            <div id="loading" class="text-gray-300 text-sm italic">Connecting to archive...</div>
        </main>
        
        <footer class="mt-16 pb-8 opacity-5">
            <div class="h-px bg-black w-full"></div>
            <div class="mt-2 text-[10px] tracking-widest uppercase">End of Log</div>
        </footer>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxvO7ikFEHdMcEOq7V5vYgURUcmNRNiX3hGYRgxaUzTFkoDYssxiMXzBty2quZ3o91U/exec';
        let isToraVisible = false;

        function toggleLogo() {
            const logoImg = document.getElementById('title-logo');
            const btn = document.getElementById('toggle-tora');
            
            if (!isToraVisible) {
                logoImg.src = './logo.tora.svg?t=' + new Date().getTime();
                btn.innerText = 'とらを非表示';
                isToraVisible = true;
            } else {
                logoImg.src = './logo.svg?t=' + new Date().getTime();
                btn.innerText = 'とらを表示';
                isToraVisible = false;
            }
        }

        async function fetchLogs() {
            const container = document.getElementById('log-container');
            const loading = document.getElementById('loading');

            try {
                const response = await fetch(`${API_URL}?t=${new Date().getTime()}`);
                if (!response.ok) throw new Error('Network response was not ok');
                
                const logs = await response.json();
                renderLogs(logs);
            } catch (e) {
                loading.innerHTML = `<div class="text-red-400 text-sm">Failed to load.</div>`;
                console.error('Fetch error:', e);
            }
        }

        function renderLogs(logs) {
            const container = document.getElementById('log-container');
            container.innerHTML = '';
            
            if (!logs || logs.length === 0) {
                container.innerHTML = '<div class="text-gray-300 text-sm italic">No records found.</div>';
                return;
            }

            logs.forEach((log, index) => {
                const div = document.createElement('div');
                const borderClass = index === 0 ? '' : 'border-t border-black/[0.06] pt-6 pb-2';
                div.className = `log-item ${borderClass}`;
                
                div.innerHTML = `
                    <time class="block mb-1 text-[11.2px] text-[#0000ff] font-normal tracking-wider">${log.timestamp}</time>
                    <p class="text-[14px] leading-normal text-black font-normal">${log.content}</p>
                `;
                container.appendChild(div);
            });
        }

        window.onload = fetchLogs;
    </script>
</body>
</html>
