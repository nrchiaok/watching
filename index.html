<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>watching</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            word-break: break-all;
            background-color: #ffffff;
            color: #000000;
        }
        .font-montserrat {
            font-family: 'Montserrat', sans-serif;
        }
        .font-noto {
            font-family: 'Noto Sans JP', sans-serif;
        }
        /* アニメーション：ふわっと表示させる */
        .log-item {
            animation: fadeIn 0.8s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="font-noto">

    <div class="max-w-4xl mx-auto min-h-screen flex flex-col p-8 md:p-16">
        
        <header class="mb-20">
            <h1 class="text-7xl md:text-8xl font-bold font-montserrat tracking-tighter uppercase">watching</h1>
        </header>

        <main id="log-container" class="flex-1 space-y-16">
            <div id="loading" class="text-gray-300 text-2xl italic font-noto">Connecting to archive...</div>
        </main>
        
        <footer class="mt-24 pb-12 opacity-10">
            <div class="h-px bg-black w-full"></div>
            <div class="mt-4 text-xs font-montserrat tracking-widest uppercase">End of Log</div>
        </footer>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxvO7ikFEHdMcEOq7V5vYgURUcmNRNiX3hGYRgxaUzTFkoDYssxiMXzBty2quZ3o91U/exec';

        async function fetchLogs() {
            const container = document.getElementById('log-container');
            const loading = document.getElementById('loading');

            try {
                const response = await fetch(`${API_URL}?t=${new Date().getTime()}`);
                if (!response.ok) throw new Error('Network response was not ok');
                
                const logs = await response.json();
                renderLogs(logs);
            } catch (e) {
                loading.innerHTML = `
                    <div class="text-red-400 text-xl font-noto">
                        Failed to load.<br>
                        <span class="text-sm opacity-50">Please check GAS permissions or URL.</span>
                    </div>`;
                console.error('Fetch error:', e);
            }
        }

        function renderLogs(logs) {
            const container = document.getElementById('log-container');
            container.innerHTML = '';
            
            if (!logs || logs.length === 0) {
                container.innerHTML = '<div class="text-gray-300 text-2xl italic font-noto">No records found.</div>';
                return;
            }

            logs.forEach((log, index) => {
                const div = document.createElement('div');
                /* 
                   区切り線のロジック: 
                   最初の項目以外(index !== 0)に、ごく細い線(border-t border-black/5)を付与。
                   透明度を5%まで下げることで、実線でありながら髪の毛のような細さを表現します。
                */
                const borderClass = index === 0 ? '' : 'border-t border-black/[0.06] pt-16';
                div.className = `log-item ${borderClass}`;
                
                div.innerHTML = `
                    <time class="font-noto text-[11.2px] block mb-4 text-[#0000ff] font-normal tracking-wider">${log.timestamp}</time>
                    <p class="font-noto text-[28px] leading-relaxed text-black font-normal">${log.content}</p>
                `;
                container.appendChild(div);
            });
        }

        window.onload = fetchLogs;
    </script>
</body>
</html>
