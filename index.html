<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>watching</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --base-font-size: 26px; /* 元の約2倍のサイズを基準に設定 */
        }
        body {
            -webkit-tap-highlight-color: transparent;
            word-break: break-all;
        }
        /* ヘルベチカ（タイトル用） */
        .font-helvetica {
            font-family: 'Helvetica', 'Arial', sans-serif;
        }
        /* Microsoft Sans Serif（日時用） */
        .font-ms-sans {
            font-family: 'Microsoft Sans Serif', 'Arial', sans-serif;
        }
        /* Noto Sans JP（本文用） */
        .font-noto {
            font-family: 'Noto Sans JP', sans-serif;
        }
    </style>
</head>
<body id="body" class="bg-white text-black transition-colors duration-500 min-h-screen font-noto">

    <div class="max-w-4xl mx-auto min-h-screen flex flex-col p-8 md:p-16">
        <header class="mb-20">
            <!-- タイトルをwatchingに変更、斜体解除、Helvetica、サイズ2倍 -->
            <h1 class="text-7xl font-bold font-helvetica tracking-tighter">watching</h1>
        </header>

        <main id="log-container" class="flex-1 space-y-16">
            <div id="loading" class="text-gray-300 text-xl italic">Loading...</div>
        </main>
        
        <footer class="mt-20 pb-10 opacity-20">
            <div class="h-px bg-black w-full"></div>
        </footer>
    </div>

    <script>
        // 【重要】ここにあなたのGASのURLを貼り付けてください
        const API_URL = 'https://script.google.com/macros/s/AKfycbyrVunEj9ahlnOb3iI0gt6bvZ233pLesEwUbO9P69Y/dev';

        async function fetchLogs() {
            try {
                const response = await fetch(API_URL);
                const logs = await response.json();
                renderLogs(logs);
            } catch (e) {
                document.getElementById('loading').innerText = 'Failed to load.';
                console.error(e);
            }
        }

        function renderLogs(logs) {
            const container = document.getElementById('log-container');
            container.innerHTML = '';
            
            if (logs.length === 0) {
                container.innerHTML = '<div class="text-gray-300 text-xl italic">No records.</div>';
                return;
            }

            logs.forEach(log => {
                const div = document.createElement('div');
                div.className = 'log-item group animate-in fade-in duration-700';
                
                /* 
                   日時のフォントサイズは本文(28px)の60% = 約16.8px
                   本文のフォントサイズは従来の倍 = 28px
                */
                div.innerHTML = `
                    <time class="font-ms-sans text-[16.8px] block mb-3 text-black leading-none">${log.timestamp}</time>
                    <p class="content-text text-[28px] leading-relaxed text-black">${log.content}</p>
                `;
                container.appendChild(div);
            });
        }

        // ページ読み込み時に実行
        window.onload = fetchLogs;
    </script>
</body>
</html>
