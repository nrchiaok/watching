<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nrchi watching</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 
           全体フォント設定
           Arialを先頭に置くことで、英数字にはArialを、
           日本語には各OSの標準的なゴシック体を適用します。
        */
        body {
            font-family: Arial, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
            font-weight: 400; /* 太さを標準（Normal）に固定 */
            background-color: #ffffff;
            color: #000000;
            line-height: 1.5; /* メモ帳に近い標準的な行間 */
        }

        /* Win95/98風ボタン */
        .win95-button {
            background: #c0c0c0;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #808080;
            border-bottom: 2px solid #808080;
            padding: 2px 8px;
            font-size: 11px;
            color: #000000;
            cursor: pointer;
            outline: 1px solid #000000;
            margin-left: 12px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            font-family: Arial, sans-serif;
            font-weight: 400;
        }
        .win95-button:active {
            border-top: 2px solid #808080;
            border-left: 2px solid #808080;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            padding: 3px 7px 1px 9px;
        }

        /* タイムスタンプ専用スタイル（Arial / 青色 / 11.2px） */
        .timestamp {
            font-family: Arial, sans-serif;
            color: #0000ff;
            font-size: 11.2px;
            font-weight: 400;
            line-height: 1;
            display: block;
            margin-bottom: 4px;
        }

        /* 本文専用スタイル（Arialを優先 / 標準の太さ / 28px） */
        .log-content {
            font-family: Arial, "Hiragino Sans", "Meiryo", sans-serif;
            font-size: 28px;
            font-weight: 400;
            color: #000000;
            white-space: pre-wrap;
        }

        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="p-6 md:p-12 max-w-4xl mx-auto">

    <header class="mb-12 flex items-center">
        <!-- ロゴの高さに合わせてボタンの中央を揃える -->
        <div id="logo-container" class="flex-shrink-0 flex items-center">
            <img id="main-logo" src="./logo.svg" alt="watching" class="h-[26px] md:h-[38px] w-auto">
        </div>
        <button id="toggle-btn" class="win95-button" onclick="toggleLogo()">とらを表示</button>
    </header>

    <main id="log-container" class="space-y-10">
        <div id="loading-placeholder" class="space-y-10">
            <div class="pt-6 border-t border-black/[0.06]">
                <div class="h-3 w-20 skeleton mb-2"></div>
                <div class="h-6 w-full skeleton"></div>
            </div>
        </div>
    </main>

    <script>
        const gasUrl = 'https://script.google.com/macros/s/AKfycbycakY2v4gb9JN4oehCosRm_MucFMt3hd_FW5ZMPx9Ypktzc4qQKcFilo2BLdOF4P6C/exec';
        let isTora = false;

        function toggleLogo() {
            const logoImg = document.getElementById('main-logo');
            const btn = document.getElementById('toggle-btn');
            isTora = !isTora;
            const timestamp = new Date().getTime();
            if (isTora) {
                logoImg.src = `./logo.tora.svg?t=${timestamp}`;
                btn.textContent = 'とらを非表示';
            } else {
                logoImg.src = `./logo.svg?t=${timestamp}`;
                btn.textContent = 'とらを表示';
            }
        }

        async function fetchLogs() {
            try {
                const response = await fetch(gasUrl);
                const data = await response.json();
                renderLogs(data);
            } catch (error) {
                document.getElementById('log-container').innerHTML = 
                    '<p class="text-red-500 text-sm">データの読み込みに失敗しました。</p>';
            }
        }

        function renderLogs(logs) {
            const container = document.getElementById('log-container');
            container.innerHTML = '';

            logs.forEach((log, index) => {
                const logItem = document.createElement('div');
                const borderClass = index === 0 ? '' : 'border-t border-black/[0.06] pt-6';
                logItem.className = `flex flex-col ${borderClass}`;

                // 日時エリア
                const timeStr = document.createElement('span');
                timeStr.className = 'timestamp';
                timeStr.textContent = log.timestamp;

                // 本文エリア
                const content = document.createElement('p');
                content.className = 'log-content';
                content.textContent = log.content;

                logItem.appendChild(timeStr);
                logItem.appendChild(content);
                container.appendChild(logItem);
            });
        }

        window.onload = fetchLogs;
    </script>
</body>
</html>
