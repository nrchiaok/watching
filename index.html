<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>watching</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            word-break: break-all;
            background-color: #ffffff;
            color: #000000;
        }
        .font-noto {
            font-family: 'Noto Sans JP', sans-serif;
        }
        .log-item {
            animation: fadeIn 0.6s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="font-noto">

    <div class="max-w-4xl mx-auto min-h-screen flex flex-col p-8 md:p-12">
        
        <header class="mb-12">
            <!-- タイトル：テキストから画像（logo.svg）に置き換え 
                 w-[数字] でサイズを調整します。PC(md)では少し大きくしています -->
            <img src="./logo.svg" alt="watching" class="w-[180px] md:w-[240px] h-auto">
        </header>

        <main id="log-container" class="flex-1 space-y-8">
            <div id="loading" class="text-gray-300 text-lg italic">Connecting to archive...</div>
        </main>
        
        <footer class="mt-16 pb-8 opacity-5">
            <div class="h-px bg-black w-full"></div>
            <div class="mt-2 text-[10px] tracking-widest uppercase">End of Log</div>
        </footer>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxvO7ikFEHdMcEOq7V5vYgURUcmNRNiX3hGYRgxaUzTFkoDYssxiMXzBty2quZ3o91U/exec';

        async function fetchLogs() {
            const container = document.getElementById('log-container');
            const loading = document.getElementById('loading');

            try {
                const response = await fetch(`${API_URL}?t=${new Date().getTime()}`);
                if (!response.ok) throw new Error('Network response was not ok');
                
                const logs = await response.json();
                renderLogs(logs);
            } catch (e) {
                loading.innerHTML = `<div class="text-red-400 text-sm">Failed to load.</div>`;
                console.error('Fetch error:', e);
            }
        }

        function renderLogs(logs) {
            const container = document.getElementById('log-container');
            container.innerHTML = '';
            
            if (!logs || logs.length === 0) {
                container.innerHTML = '<div class="text-gray-300 text-sm italic">No records found.</div>';
                return;
            }

            logs.forEach((log, index) => {
                const div = document.createElement('div');
                // 2つ目以降のログの上にだけ細い区切り線を入れる
                const borderClass = index === 0 ? '' : 'border-t border-black/[0.06] pt-8';
                div.className = `log-item ${borderClass}`;
                
                div.innerHTML = `
                    <time class="block mb-2 text-[11px] text-[#0000ff] font-normal tracking-wider">${log.timestamp}</time>
                    <p class="text-[14px] leading-relaxed text-black font-normal">${log.content}</p>
                `;
                container.appendChild(div);
            });
        }

        window.onload = fetchLogs;
    </script>
</body>
</html>
