<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nrchi watching</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            /* 英数字はArial、日本語は游ゴシック Pr6N Rを優先、太さは標準固定 */
            font-family: Arial, "Yu Gothic Pr6N", "Yu Gothic", "Noto Sans JP", sans-serif;
            font-weight: 400;
            background-color: #ffffff;
            color: #000000;
            -webkit-font-smoothing: antialiased;
        }
        /* Win95/98風ボタン */
        .win95-button {
            background: #c0c0c0;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #808080;
            border-bottom: 2px solid #808080;
            padding: 2px 8px;
            font-size: 11px;
            color: #000000;
            cursor: pointer;
            outline: 1px solid #000000;
            margin-left: 12px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }
        .win95-button:active {
            border-top: 2px solid #808080;
            border-left: 2px solid #808080;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            padding: 3px 7px 1px 9px;
        }
        .link {
            color: #0000ff;
            text-decoration: underline;
        }
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="p-6 md:p-12 max-w-3xl mx-auto">

    <header class="mb-8 flex items-center">
        <div id="logo-container" class="flex-shrink-0">
            <img id="main-logo" src="./logo.svg" alt="watching" class="h-[26px] md:h-[38px] w-auto">
        </div>
        <button id="toggle-btn" class="win95-button" onclick="toggleLogo()">とらを表示</button>
    </header>

    <main id="log-container" class="space-y-4"> <!-- 全体のログ同士の間隔をさらに詰め -->
        <div id="loading-placeholder" class="space-y-4">
            <div class="pt-2 border-t border-black/[0.06]">
                <div class="h-3 w-20 skeleton mb-2"></div>
                <div class="h-4 w-full skeleton"></div>
            </div>
        </div>
    </main>

    <script>
        const gasUrl = 'https://script.google.com/macros/s/AKfycbycakY2v4gb9JN4oehCosRm_MucFMt3hd_FW5ZMPx9Ypktzc4qQKcFilo2BLdOF4P6C/exec';
        let isTora = false;

        function toggleLogo() {
            const logoImg = document.getElementById('main-logo');
            const btn = document.getElementById('toggle-btn');
            isTora = !isTora;
            const timestamp = new Date().getTime();
            if (isTora) {
                logoImg.src = `./logo.tora.svg?t=${timestamp}`;
                btn.textContent = 'とらを非表示';
            } else {
                logoImg.src = `./logo.svg?t=${timestamp}`;
                btn.textContent = 'とらを表示';
            }
        }

        function linkify(text) {
            const urlPattern = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
            return text.replace(urlPattern, '<a href="$1" target="_blank" class="link">$1</a>');
        }

        async function fetchLogs() {
            try {
                const response = await fetch(gasUrl);
                const data = await response.json();
                renderLogs(data);
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function renderLogs(logs) {
            const container = document.getElementById('log-container');
            container.innerHTML = '';

            logs.forEach((log, index) => {
                const logItem = document.createElement('div');
                // 区切り線の上の余白を pt-2 に維持
                const borderClass = index === 0 ? '' : 'border-t border-black/[0.06] pt-2';
                logItem.className = `flex flex-col ${borderClass}`;

                // 日時 (Arial / 11.2px / #0000ff)
                const timeStr = document.createElement('span');
                timeStr.className = 'text-[#0000ff] mb-1';
                timeStr.style.fontSize = '11.2px';
                timeStr.style.lineHeight = '1';
                timeStr.textContent = log.timestamp;

                // 本文 (14px / 行間1.5) - 下の余白を mb-4 から mb-2 に半分に縮小
                const content = document.createElement('div');
                content.className = 'text-[14px] leading-[1.5] whitespace-pre-wrap mb-2';
                content.innerHTML = linkify(log.content || "");

                logItem.appendChild(timeStr);
                logItem.appendChild(content);

                // 写真表示
                if (log.photos && log.photos.length > 0) {
                    const gallery = document.createElement('div');
                    // 写真がある場合も下の余白を最小限に (pb-2)
                    gallery.className = 'flex flex-wrap gap-[14px] w-full pb-2';
                    
                    log.photos.forEach(url => {
                        const imgWrapper = document.createElement('div');
                        imgWrapper.className = 'w-[70%] mx-auto md:mx-0 md:w-[calc(25%-10.5px)]';
                        
                        const img = document.createElement('img');
                        img.src = url;
                        img.className = 'w-full h-[180px] object-cover bg-gray-50';
                        img.loading = 'lazy';
                        img.onerror = function() {
                            this.style.display = 'none';
                        };
                        
                        imgWrapper.appendChild(img);
                        gallery.appendChild(imgWrapper);
                    });
                    logItem.appendChild(gallery);
                }

                container.appendChild(logItem);
            });
        }

        window.onload = fetchLogs;
    </script>
</body>
</html>
