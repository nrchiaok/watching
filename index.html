<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nrchi watching</title>
    <style>
        /* 1. 基本フォント・ウェイト設定 */
        * {
            box-sizing: border-box;
            font-weight: 400 !important; /* 太字を絶対に使用しない */
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, "Yu Gothic Pr6N", "Yu Gothic", sans-serif;
            background-color: #ffffff;
            color: #000000;
            padding: 20px;
            line-height: 1.4;
        }

        /* 2. ヘッダーとWin95風ボタン */
        header {
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        #logo {
            height: 40px;
            display: block;
        }
        .win95-btn {
            background: #c0c0c0;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #808080;
            border-bottom: 2px solid #808080;
            padding: 4px 10px;
            cursor: pointer;
            font-family: Arial;
            font-size: 12px;
            outline: none;
            user-select: none;
        }
        .win95-btn:active {
            border-top: 2px solid #808080;
            border-left: 2px solid #808080;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
        }

        /* 3. ログエントリーのレイアウト */
        .log-entry {
            margin-bottom: 14px; /* 区切り線との間隔 */
        }
        .timestamp {
            font-size: 11.2px;
            color: #0000ff;
            margin-bottom: 4px;
        }
        .content {
            font-size: 14px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .content a {
            color: #0000ff;
            text-decoration: underline;
        }

        /* 4. 画像レイアウト・レスポンシブ仕様 */
        .photo-container {
            display: flex;
            flex-wrap: wrap;
            gap: 14px; /* 写真同士の間隔 14px */
            margin-top: 14px;
        }
        .photo-item {
            display: block;
        }
        .photo-item img {
            display: block;
            width: 100%;
            height: auto;
            object-fit: contain; /* トリミングしない */
        }

        /* パターン1: 通常・正方形 (スマホ70%中央, PC25%横並び) */
        @media (max-width: 768px) {
            .photo-item.standard {
                width: 70%;
                margin: 0 auto;
            }
            /* パターン2: 超横長 */
            .photo-item.wide {
                width: 100%;
            }
            /* パターン3: 超縦長 */
            .photo-item.tall img {
                max-height: 100vw;
            }
        }
        @media (min-width: 769px) {
            .photo-item.standard {
                width: calc(25% - 10.5px); /* 4枚並び・隙間計算 */
            }
            /* パターン2: 超横長 */
            .photo-item.wide {
                width: 100%;
            }
            /* パターン3: 超縦長 */
            .photo-item.tall {
                width: auto;
            }
            .photo-item.tall img {
                max-height: 100vw;
                width: auto;
            }
        }

        /* 区切り線 */
        .separator {
            border: none;
            border-top: 1px solid #cccccc;
            margin-bottom: 14px;
        }

        #loading {
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>

<header>
    <img src="logo.svg" id="logo" alt="logo">
    <button class="win95-btn" onclick="toggleLogo()">Change Logo</button>
</header>

<div id="log-container">
    <p id="loading">Loading logs...</p>
</div>

<script>
    // --- 設定: ここにGASのURLを貼り付けてください ---
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbwDy9yKQ2umS_bkDfYwa3eYForECbH-vlIl8tYLhzWwSycnubvqGjXa_Unerf4VOPl8/exec";

    // ロゴ切り替え機能
    function toggleLogo() {
        const logo = document.getElementById('logo');
        if (logo.src.includes('logo.svg')) {
            logo.src = 'logo.tora.svg';
        } else {
            logo.src = 'logo.svg';
        }
    }

    // URLをリンクに変換する機能 (Linkify)
    function linkify(text) {
        const urlPattern = /(https?:\/\/[^\s]+)/g;
        return text.replace(urlPattern, '<a href="$1" target="_blank">$1</a>');
    }

    // 画像読み込み完了時にアスペクト比を判定してクラス付与
    function handleImageLoad(img) {
        const ratio = img.naturalWidth / img.naturalHeight;
        const parent = img.parentElement;

        if (ratio > 2.0) {
            parent.classList.add('wide'); // 超横長
        } else if (ratio < 0.5) {
            parent.classList.add('tall'); // 超縦長
        } else {
            parent.classList.add('standard'); // 通常・正方形
        }
    }

    // データ取得と表示
    async function fetchLogs() {
        try {
            const response = await fetch(GAS_API_URL);
            const data = await response.json();
            const container = document.getElementById('log-container');
            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = '<p>No logs found.</p>';
                return;
            }

            data.forEach(log => {
                const entry = document.createElement('div');
                entry.className = 'log-entry';

                // 日付
                const ts = document.createElement('div');
                ts.className = 'timestamp';
                ts.textContent = log.timestamp;
                entry.appendChild(ts);

                // 本文
                const content = document.createElement('div');
                content.className = 'content';
                content.innerHTML = linkify(log.content);
                entry.appendChild(content);

                // 写真
                if (log.photos && log.photos.length > 0) {
                    const photoContainer = document.createElement('div');
                    photoContainer.className = 'photo-container';
                    
                    log.photos.forEach(src => {
                        const photoItem = document.createElement('div');
                        photoItem.className = 'photo-item';
                        
                        const img = document.createElement('img');
                        img.src = src;
                        img.alt = "";
                        // 読み込みエラー時は親要素ごと削除
                        img.onerror = () => photoItem.remove();
                        // 読み込み完了時にレイアウト判定
                        img.onload = () => handleImageLoad(img);
                        
                        photoItem.appendChild(img);
                        photoContainer.appendChild(photoItem);
                    });
                    entry.appendChild(photoContainer);
                }

                container.appendChild(entry);

                // 区切り線
                const hr = document.createElement('hr');
                hr.className = 'separator';
                container.appendChild(hr);
            });
        } catch (error) {
            console.error("Error fetching logs:", error);
            document.getElementById('loading').textContent = "Failed to load logs.";
        }
    }

    fetchLogs();
</script>

</body>
</html>
