<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watching Timeline</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📱 Watching Timeline</h1>
            <p>Watching の時間軸</p>
        </header>

        <div class="form-section">
            <a href="https://docs.google.com/forms/d/e/1FAIpQLScP3Ak7iDk56pDNDuScyhi44RYfyua0JltXyX_w0_9uNC_kxA/viewform?usp=publish-editor" target="_blank" class="btn-form">
                📝 add "watching"
            </a>
        </div>

        <div class="timeline" id="timeline">
            <p class="loading">読み込み中...</p>
        </div>
    </div>

    <script>
        const SPREADSHEET_ID = '1BQA90iL1Z5j1phl8UGyiQ_3huk2mEKSWbqiOa2NHna8';
        const GOOGLE_FORM_LINK = 'https://docs.google.com/forms/d/e/1FAIpQLScP3Ak7iDk56pDNDuScyhi44RYfyua0JltXyX_w0_9uNC_kxA/viewform?usp=publish-editor';

        async function fetchWatchingData() {
            try {
                // Google Sheets APIを使用してデータ取得
                const apiKey = 'AIzaSyDaRr6zxpEokJydz4wI_T9AW7eKXNbZCOQ';
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}?key=${apiKey}&includeGridData=true`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                // シートからデータ取得
                const sheets = data.sheets;
                if (!sheets || sheets.length === 0) {
                    document.getElementById('timeline').innerHTML = '<p class="empty">データが見つかりません</p>';
                    return;
                }
                
                // 最初のシートを使用
                const sheetData = sheets[0].data[0];
                const rows = sheetData.rowData;
                
                if (!rows || rows.length <= 1) {
                    document.getElementById('timeline').innerHTML = '<p class="empty">まだ watching がありません</p>';
                    return;
                }
                
                const timeline = document.getElementById('timeline');
                timeline.innerHTML = '';
                
                // ヘッダー行をスキップ（1行目）して、2行目以降を処理
                const watchingItems = [];
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row.values || row.values.length === 0) continue;
                    
                    const timestamp = row.values[0]?.userEnteredValue?.stringValue || row.values[0]?.formattedValue || '日時不明';
                    const comment = row.values[1]?.userEnteredValue?.stringValue || row.values[1]?.formattedValue || '内容なし';
                    const name = row.values[2]?.userEnteredValue?.stringValue || row.values[2]?.formattedValue || '名前なし';
                    
                    if (comment && comment !== '内容な���') {
                        watchingItems.push({ timestamp, comment, name, index: i });
                    }
                }
                
                if (watchingItems.length === 0) {
                    timeline.innerHTML = '<p class="empty">まだ watching がありません</p>';
                    return;
                }
                
                // 逆順で表示（新しい順）
                for (let i = watchingItems.length - 1; i >= 0; i--) {
                    const item = watchingItems[i];
                    const watchingElement = document.createElement('div');
                    watchingElement.className = 'watching-item';
                    watchingElement.innerHTML = `
                        <div class="watching-header">
                            <span class="watching-name">${escapeHtml(item.name)}</span>
                            <span class="watching-time">${item.timestamp}</span>
                        </div>
                        <div class="watching-content">
                            ${escapeHtml(item.comment)}
                        </div>
                        <div class="watching-actions">
                            <button class="btn-edit" onclick="editWatching(${item.index})">✏️ 編集</button>
                            <button class="btn-delete" onclick="deleteWatching(${item.index})">🗑️ 削除</button>
                        </div>
                    `;
                    timeline.appendChild(watchingElement);
                }
            } catch (error) {
                console.error('エラー:', error);
                document.getElementById('timeline').innerHTML = '<p class="error">データ読み込みエラー</p>';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function editWatching(index) {
            alert(`編集するには、スプレッドシートを開いて${index + 1}行目を編集してください。\n\nスプレッドシート: https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/edit`);
            window.open(`https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/edit`, '_blank');
        }

        function deleteWatching(index) {
            if (confirm(`この watching を削除しますか？\n\nスプレッドシートの${index + 1}行目を削除してください。`)) {
                alert(`スプレッドシートを開いて${index + 1}行目を削除してください。`);
                window.open(`https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/edit`, '_blank');
            }
        }

        // 初回読み込み
        fetchWatchingData();

        // 30秒ごとに自動更新
        setInterval(fetchWatchingData, 30000);
    </script>
</body>
</html>
