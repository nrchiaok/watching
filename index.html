<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nrchi watching</title>
    <style>
        /* 1. 基本フォント・ウェイト設定 */
        * {
            box-sizing: border-box;
            font-weight: 400 !important; 
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, "Yu Gothic Pr6N", "Yu Gothic", sans-serif;
            background-color: #ffffff;
            color: #000000;
            padding: 20px;
            line-height: 1.4;
        }

        /* 2. とらボタン */
        header {
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        #logo {
            height: 40px;
            display: block;
        }
        .win95-btn {
            background: #c0c0c0;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #808080;
            border-bottom: 2px solid #808080;
            padding: 4px 10px;
            cursor: pointer;
            font-family: Arial;
            font-size: 12px;
            outline: none;
            user-select: none;
        }
        .win95-btn:active {
            border-top: 2px solid #808080;
            border-left: 2px solid #808080;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
        }

        /* 3. レイアウト */
        .log-entry {
            margin-bottom: 14px;
        }
        .timestamp {
            font-size: 11.2px;
            color: #0000ff;
            margin-bottom: 4px;
        }
        .content {
            font-size: 14px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .content a {
            color: #0000ff;
            text-decoration: underline;
        }

        /* 4. 画像レイアウト・レスポンシブ設定 */
        .photo-container {
            display: flex;
            flex-wrap: wrap;
            gap: 14px; 
            margin-top: 14px;
        }
        .photo-item {
            display: block;
        }
        .photo-item img {
            display: block;
            width: 100%;
            height: auto;
            object-fit: contain; 
        }

        /* パターン1: 通常・正方形 (スマホ70%中央, PC25%横並び) */
        @media (max-width: 768px) {
            .photo-item.standard {
                width: 70%;
                margin: 0 auto;
            }
        
            .photo-item.wide {
                width: 100%;
            }
       
            .photo-item.tall img {
                max-height: 100vw;
            }
        }
        @media (min-width: 769px) {
            .photo-item.standard {
                width: calc(25% - 10.5px); 
            }
          
            .photo-item.wide {
                width: 100%;
            }
    
            .photo-item.tall {
                width: auto;
            }
            .photo-item.tall img {
                max-height: 100vw;
                width: auto;
            }
        }

        /* 区切り線 */
        .separator {
            border: none;
            border-top: 1px solid #cccccc;
            margin-bottom: 14px;
        }

        #loading {
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>

<header>
    <img src="logo.svg" id="logo" alt="logo">
    <button class="win95-btn" onclick="toggleLogo(this)">とらを表示</button>
</header>

<div id="log-container">
    <p id="loading">Loading logs...</p>
</div>

<script>
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbwDy9yKQ2umS_bkDfYwa3eYForECbH-vlIl8tYLhzWwSycnubvqGjXa_Unerf4VOPl8/exec";

    function toggleLogo(btn) {
        const logo = document.getElementById('logo');
        if (logo.getAttribute('src') === 'logo.svg') {
            logo.setAttribute('src', 'logo.tora.svg');
            btn.textContent = 'とらを非表示';
        } else {
            logo.setAttribute('src', 'logo.svg');
            btn.textContent = 'とらを表示';
        }
    }

    function linkify(text) {
        const urlPattern = /(https?:\/\/[^\s]+)/g;
        return text.replace(urlPattern, '<a href="$1" target="_blank">$1</a>');
    }
    
    function handleImageLoad(img) {
        const ratio = img.naturalWidth / img.naturalHeight;
        const parent = img.parentElement;

        if (ratio > 2.0) {
            parent.classList.add('wide'); 
        } else if (ratio < 0.5) {
            parent.classList.add('tall'); 
        } else {
            parent.classList.add('standard'); 
        }
    }

    // データ取得と表示
    async function fetchLogs() {
        try {
            const response = await fetch(GAS_API_URL);
            const data = await response.json();
            const container = document.getElementById('log-container');
            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = '<p>No logs found.</p>';
                return;
            }

            data.forEach(log => {
                const entry = document.createElement('div');
                entry.className = 'log-entry';

                // 日付
                const ts = document.createElement('div');
                ts.className = 'timestamp';
                ts.textContent = log.timestamp;
                entry.appendChild(ts);

                // 本文
                const content = document.createElement('div');
                content.className = 'content';
                content.innerHTML = linkify(log.content);
                entry.appendChild(content);

                // 写真
                if (log.photos && log.photos.length > 0) {
                    const photoContainer = document.createElement('div');
                    photoContainer.className = 'photo-container';
                    
                    log.photos.forEach(src => {
                        const photoItem = document.createElement('div');
                        photoItem.className = 'photo-item';
                        
                        const img = document.createElement('img');
                        img.src = src;
                        img.alt = "";
                        img.onerror = () => photoItem.remove();
                        img.onload = () => handleImageLoad(img);
                        
                        photoItem.appendChild(img);
                        photoContainer.appendChild(photoItem);
                    });
                    entry.appendChild(photoContainer);
                }

                container.appendChild(entry);

                // 区切り線
                const hr = document.createElement('hr');
                hr.className = 'separator';
                container.appendChild(hr);
            });
        } catch (error) {
            console.error("Error fetching logs:", error);
            document.getElementById('loading').textContent = "Failed to load logs.";
        }
    }

    fetchLogs();
</script>

</body>
</html>
