<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nrchi watching</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            /* 日本語は游ゴシック Pr6N、英数字はArial */
            font-family: Arial, "Hiragino Sans", "Yu Gothic Pr6N", "Yu Gothic", "Noto Sans JP", sans-serif;
            font-weight: 400; /* 全て標準の太さ */
            background-color: #ffffff;
            color: #000000;
            line-height: 1.5; 
            -webkit-font-smoothing: antialiased;
        }

        /* 旧Windows風ボタン */
        .win95-button {
            background: #c0c0c0;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #808080;
            border-bottom: 2px solid #808080;
            padding: 2px 8px;
            font-size: 11px;
            color: #000000;
            cursor: pointer;
            outline: 1px solid #000000;
            margin-left: 12px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }
        .win95-button:active {
            border-top: 2px solid #808080;
            border-left: 2px solid #808080;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            padding: 3px 7px 1px 9px;
        }

        /* リンクのスタイル */
        .link { color: #0000ff; text-decoration: underline; }

        /* スケルトンアニメーション */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="p-6 md:p-12 max-w-3xl mx-auto">

    <header class="mb-8 flex items-center">
        <div id="logo-container" class="flex-shrink-0">
            <img id="main-logo" src="./logo.svg" alt="watching" class="h-[26px] md:h-[38px] w-auto">
        </div>
        <button id="toggle-btn" class="win95-button" onclick="toggleLogo()">とらを表示</button>
    </header>

    <main id="log-container" class="space-y-4">
        <div id="loading-placeholder" class="space-y-10">
            <div class="pt-10 border-t border-black/[0.06]">
                <div class="h-3 w-20 skeleton mb-2"></div>
                <div class="h-4 w-full skeleton"></div>
            </div>
        </div>
    </main>

    <script>
        // デプロイしたウェブアプリのURLに書き換えてください
        const gasUrl = 'https://script.google.com/macros/s/AKfycbzHp-f0w6IYYv6xjtY6ZEybe34p9_Js5TLXLVuGGRjgOxNbwGSyJbvnZDnEm2kyQroP/exec';
        let isTora = false;

        function toggleLogo() {
            const logoImg = document.getElementById('main-logo');
            const btn = document.getElementById('toggle-btn');
            isTora = !isTora;
            const timestamp = new Date().getTime();
            if (isTora) {
                logoImg.src = `./logo.tora.svg?t=${timestamp}`;
                btn.textContent = 'とらを非表示';
            } else {
                logoImg.src = `./logo.svg?t=${timestamp}`;
                btn.textContent = 'とらを表示';
            }
        }

        // 本文内のURLを自動リンク化
        function linkify(text) {
            const urlPattern = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
            return text.replace(urlPattern, '<a href="$1" target="_blank" class="link">$1</a>');
        }

        async function fetchLogs() {
            try {
                const response = await fetch(gasUrl);
                const data = await response.json();
                renderLogs(data);
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function renderLogs(logs) {
            const container = document.getElementById('log-container');
            container.innerHTML = '';

            logs.forEach((log, index) => {
                const logItem = document.createElement('div');
                // 区切り線とつぶやきの間隔：行間の約1.8倍（40px相当）
                const borderClass = index === 0 ? '' : 'border-t border-black/[0.06] pt-10';
                logItem.className = `flex flex-col ${borderClass}`;

                // 日時（Arial / 11.2px / 青色 / 標準の太さ / 文頭整列）
                const timeStr = document.createElement('span');
                timeStr.className = 'text-[#0000ff] font-normal leading-none mb-1';
                timeStr.style.fontSize = '11.2px';
                timeStr.style.fontFamily = 'Arial, sans-serif';
                timeStr.textContent = log.timestamp;

                // 本文（14px / 游ゴシック体 Pr6N / 標準の太さ / 行間1.5）
                const content = document.createElement('div');
                content.className = 'text-[14px] leading-[1.5] whitespace-pre-wrap mb-6';
                content.innerHTML = linkify(log.content);

                logItem.appendChild(timeStr);
                logItem.appendChild(content);

                // 写真ギャラリー（スマホ：70%幅中央寄せ / PC：横4枚・等幅グリッド）
                if (log.photos && log.photos.length > 0) {
                    const gallery = document.createElement('div');
                    gallery.className = 'flex flex-wrap gap-[14px] w-full pb-4';
                    
                    log.photos.forEach(url => {
                        const imgWrapper = document.createElement('div');
                        // スマホ：幅70%中央寄せ。PC：幅25%から1文字分(14px)の隙間を計算して引く。
                        imgWrapper.className = 'w-[70%] mx-auto md:mx-0 md:w-[calc(25%-10.5px)]';
                        
                        const img = document.createElement('img');
                        img.src = url;
                        // PCで比率が違っても面積が同じに見えるよう object-cover を使用
                        img.className = 'w-full h-auto md:h-[180px] object-cover bg-gray-50';
                        img.loading = 'lazy';
                        
                        imgWrapper.appendChild(img);
                        gallery.appendChild(imgWrapper);
                    });
                    logItem.appendChild(gallery);
                }

                container.appendChild(logItem);
            });
        }

        window.onload = fetchLogs;
    </script>
</body>
</html>
