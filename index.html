<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nrchi watching</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: Arial, "Yu Gothic Pr6N", "Yu Gothic", "Noto Sans JP", sans-serif;
            background-color: #ffffff;
            color: #000000;
            -webkit-font-smoothing: antialiased;
        }
        /* 【要件厳守】文字の太さはすべて標準、太字は一切使用しない */
        * {
            font-weight: 400 !important;
        }
        .win95-button {
            background: #c0c0c0;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #808080;
            border-bottom: 2px solid #808080;
            padding: 2px 8px;
            font-size: 11px;
            color: #000000;
            cursor: pointer;
            outline: 1px solid #000000;
            margin-left: 12px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }
        .win95-button:active {
            border-top: 2px solid #808080;
            border-left: 2px solid #808080;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            padding: 3px 7px 1px 9px;
        }
        .link {
            color: #0000ff;
            text-decoration: underline;
        }
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        /* 画像読み込みエラー時の隙間防止用クラス */
        .img-error {
            display: none !important;
        }
    </style>
</head>
<body class="p-6 md:p-12 max-w-3xl mx-auto">
    <header class="mb-8 flex items-center">
        <div id="logo-container" class="flex-shrink-0">
            <img id="main-logo" src="./logo.svg" alt="watching" class="h-[26px] md:h-[38px] w-auto">
        </div>
        <button id="toggle-btn" class="win95-button" onclick="toggleLogo()">とらを表示</button>
    </header>
    
    <!-- space-y クラスを外し、JS内でマージンを厳密に制御する -->
    <main id="log-container" class="flex flex-col">
        <div id="loading-placeholder">
            <div class="pt-[14px] border-t border-black/[0.06]">
                <div class="h-3 w-20 skeleton mb-1"></div>
                <div class="h-4 w-full skeleton"></div>
            </div>
        </div>
    </main>
    
    <script>
        // ↓↓↓ ご自身の公開されたGASのWebアプリURLをそのまま使用してください ↓↓↓
        const gasUrl = 'https://script.google.com/macros/s/AKfycbzi0U2RA_iXQa6l-jzDIOBX05H53I6KdepVG9HAuL3gXePM3-EH--Iog2h1Y-6EUd8/exec';
        let isTora = false;
        
        function toggleLogo() {
            const logoImg = document.getElementById('main-logo');
            const btn = document.getElementById('toggle-btn');
            isTora = !isTora;
            const timestamp = new Date().getTime();
            if (isTora) {
                logoImg.src = `./logo.tora.svg?t=${timestamp}`;
                btn.textContent = 'とらを非表示';
            } else {
                logoImg.src = `./logo.svg?t=${timestamp}`;
                btn.textContent = 'とらを表示';
            }
        }
        
        function linkify(text) {
            const urlPattern = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
            return text.replace(urlPattern, '<a href="$1" target="_blank" class="link">$1</a>');
        }
        
        async function fetchLogs() {
            try {
                const response = await fetch(gasUrl);
                const data = await response.json();
                renderLogs(data);
            } catch (error) {
                console.error('Error fetching logs:', error);
                document.getElementById('loading-placeholder').innerHTML = '<p class="text-[14px]">読み込みに失敗しました。</p>';
            }
        }
        
        function renderLogs(logs) {
            const container = document.getElementById('log-container');
            container.innerHTML = '';
            
            logs.forEach((log, index) => {
                const logItem = document.createElement('div');
                
                // 【要件厳守】区切り線の間隔は「改行1つ分（14px）」に極限まで詰める
                const borderClass = index === 0 ? '' : 'border-t border-black/[0.06] mt-[14px] pt-[14px]';
                logItem.className = `flex flex-col ${borderClass}`;
                
                const timeStr = document.createElement('span');
                timeStr.className = 'text-[#0000ff] mb-1';
                timeStr.style.fontSize = '11.2px';
                timeStr.style.lineHeight = '1';
                timeStr.textContent = log.timestamp;
                
                const content = document.createElement('div');
                content.className = 'text-[14px] leading-[1.5] whitespace-pre-wrap';
                content.innerHTML = linkify(log.content || "");
                
                logItem.appendChild(timeStr);
                logItem.appendChild(content);
                
                if (log.photos && log.photos.length > 0) {
                    const gallery = document.createElement('div');
                    // 【要件厳守】写真同士の間隔は14px
                    gallery.className = 'flex flex-wrap gap-[14px] w-full mt-[14px]';
                    
                    log.photos.forEach(url => {
                        const imgWrapper = document.createElement('div');
                        // 【要件厳守】スマホ: 横幅70%中央揃え / PC: 横幅25%（隙間計算含む）最大4枚
                        imgWrapper.className = 'w-[70%] mx-auto md:mx-0 md:w-[calc(25%-10.5px)]';
                        
                        const img = document.createElement('img');
                        img.src = url;
                        // 【要件厳守】アスペクト比維持で高さ180pxにトリミング
                        img.className = 'w-full h-[180px] object-cover bg-gray-50';
                        
                        // 【修正】画像エラー時は、imgタグだけでなく親のラッパーごと消して隙間を作らない
                        img.onerror = function() { 
                            this.parentElement.classList.add('img-error'); 
                        };
                        
                        imgWrapper.appendChild(img);
                        gallery.appendChild(imgWrapper);
                    });
                    logItem.appendChild(gallery);
                }
                container.appendChild(logItem);
            });
        }
        
        window.onload = fetchLogs;
    </script>
</body>
</html>
